<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Videos - Kriya Yoga</title>

  <link rel="stylesheet" href="css/videos.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="icon" type="image/png" href="img/favicon.png" />
</head>

<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="site-logo-link">
        <img src="img/ChatGPT_Image_Apr_11__2026__07_34_25_PM-removebg-preview.png"
          alt="Kriya Yoga Logo"
          class="site-logo" />
      </a>

      <nav class="nav-center">
        <button class="nav-toggle" aria-label="Toggle menu">☰</button>

        <ul class="nav-list">
          <li><a href="kriyayoga.html">Kriya Yoga</a></li>
          <li><a href="videos.html" class="active">Videos</a></li>
          <li><a href="technique.html">Technique</a></li>
          <li><a href="learn.html">Learn Kriya</a></li>
          <li><a href="classtiming.html">Class Timings</a></li>
          <li><a href="queries.html">Send Queries</a></li>
        </ul>
      </nav>

      <div class="translate-box">
        <div id="google_translate_element"></div>
      </div>
    </div>
  </header>

  <main class="videos-page">
    <section class="videos-hero">
      <h1>Videos</h1>
    </section>

    <section class="videos-section">
      <div class="container narrow-container">

        <div id="loadingMessage" class="loading-message">Loading videos...</div>

        <section class="video-grid" id="videoGrid" aria-label="Video list"></section>

        <div class="pagination-wrap">
          <button id="prevPage" type="button">Previous</button>
          <div id="pageNumbers" class="page-numbers"></div>
          <button id="nextPage" type="button">Next</button>
        </div>

      </div>
    </section>
  </main>

  <footer class="videos-footer">
    <p>© 2026 Kriya Yoga. All rights reserved.</p>
  </footer>

  <script>
    const API_KEY = "AIzaSyDQFy8qP027uHpjvpdxFSLoMMf6uthJ0qs"; 
    const CHANNEL_ID = "UCFRQDE1sghI3TnnnKM8YrFg";
    const MAX_RESULTS = 15;

    const videoGrid = document.getElementById("videoGrid");
    const loadingMessage = document.getElementById("loadingMessage");
    const prevBtn = document.getElementById("prevPage");
    const nextBtn = document.getElementById("nextPage");
    const pageNumbers = document.getElementById("pageNumbers");

    let pageTokens = [""];
    let currentPage = 0;
    let nextPageToken = "";

    async function loadVideos(pageToken = "") {
      loadingMessage.style.display = "block";
      loadingMessage.textContent = "Loading videos...";
      videoGrid.innerHTML = "";

      const url =
        `https://www.googleapis.com/youtube/v3/search?` +
        `key=${API_KEY}` +
        `&channelId=${CHANNEL_ID}` +
        `&part=snippet,id` +
        `&order=date` +
        `&maxResults=${MAX_RESULTS}` +
        `&type=video` +
        `&pageToken=${pageToken}`;

      try {
        const response = await fetch(url);
        const data = await response.json();

        if (data.error) {
          console.error("YouTube API Error:", data.error);
          loadingMessage.textContent = data.error.message;
          return;
        }

        loadingMessage.style.display = "none";
        nextPageToken = data.nextPageToken || "";

        data.items.forEach((item) => {
          const videoId = item.id.videoId;
          const title = item.snippet.title;
          const description = item.snippet.description || "";
          const thumbnail =
            item.snippet.thumbnails.high?.url ||
            item.snippet.thumbnails.medium?.url ||
            item.snippet.thumbnails.default?.url;

          const card = document.createElement("article");
          card.className = "video-card";

          card.innerHTML = `
            <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank" rel="noopener noreferrer" class="video-link">
              <div class="thumb-wrap">
                <img src="${thumbnail}" alt="${title}">
                <span class="play-badge">▶</span>
              </div>
            </a>
            <div class="video-content">
              <h2>${title}</h2>
              <p>${description}</p>
            </div>
          `;

          videoGrid.appendChild(card);
        });

        if (nextPageToken && !pageTokens.includes(nextPageToken)) {
          pageTokens.push(nextPageToken);
        }

        renderPagination();

      } catch (error) {
        console.error(error);
        loadingMessage.textContent = "Something went wrong while loading videos.";
      }
    }

    function renderPagination() {
      pageNumbers.innerHTML = "";

      pageTokens.forEach((token, index) => {
        const pageBtn = document.createElement("button");
        pageBtn.type = "button";
        pageBtn.textContent = index + 1;

        if (index === currentPage) {
          pageBtn.classList.add("active");
        }

        pageBtn.addEventListener("click", () => {
          currentPage = index;
          loadVideos(token);
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        pageNumbers.appendChild(pageBtn);
      });

      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = !nextPageToken;
    }

    nextBtn.addEventListener("click", () => {
      if (nextPageToken) {
        currentPage++;
        loadVideos(nextPageToken);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) {
        currentPage--;
        loadVideos(pageTokens[currentPage]);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    const toggle = document.querySelector(".nav-toggle");
    const navList = document.querySelector(".nav-list");

    if (toggle && navList) {
      toggle.addEventListener("click", () => {
        navList.classList.toggle("show");
      });
    }

    loadVideos();
  </script>

</body>

</html>
